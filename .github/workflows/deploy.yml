# Horoszkóp applikáció deploy workflow
# Szükséges GitHub Secrets: GHCR_TOKEN, JCLOUD_KUBECONFIG (vagy KUBECONFIG)
name: Build and Deploy to jcloud.jedlik.cloud

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  packages: write

env:
  NAMESPACE: nemeth-lorin-dorina
  APP_NAME: horoszkop-web
  KUBECONFIG: /home/runner/.kube/config

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER_LOWER}/horoszkop:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "latest=ghcr.io/${OWNER_LOWER}/horoszkop:latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.latest }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG_DATA: ${{ secrets.JCLOUD_KUBECONFIG }}
          KUBE_CONFIG_DATA_ALT: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          RAW_KUBE_CONFIG="$KUBE_CONFIG_DATA"
          if [ -z "$RAW_KUBE_CONFIG" ]; then
            RAW_KUBE_CONFIG="$KUBE_CONFIG_DATA_ALT"
          fi

          if [ -z "$RAW_KUBE_CONFIG" ]; then
            echo "JCLOUD_KUBECONFIG and KUBECONFIG secrets are both empty or missing"
            exit 1
          fi

          # Support both raw kubeconfig YAML and base64-encoded kubeconfig.
          if echo "$RAW_KUBE_CONFIG" | base64 -d > "$HOME/.kube/config" 2>/dev/null; then
            echo "Loaded kubeconfig from base64 secret"
          else
            printf "%b" "$RAW_KUBE_CONFIG" > "$HOME/.kube/config"
            echo "Loaded kubeconfig from raw YAML secret"
          fi

          chmod 600 "$HOME/.kube/config"
          kubectl config get-contexts

      - name: Ensure namespace and image pull secret
        run: |
          kubectl -n "$NAMESPACE" create secret docker-registry ghcr-auth \
            --docker-server=ghcr.io \
            --docker-username="${{ github.repository_owner }}" \
            --docker-password="${{ secrets.GHCR_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: kubectl apply -f deployment.yaml

      - name: Update deployment image
        run: |
          kubectl -n "$NAMESPACE" set image deployment/"$APP_NAME" "$APP_NAME"="${{ steps.meta.outputs.image }}"
          kubectl -n "$NAMESPACE" rollout status deployment/"$APP_NAME" --timeout=180s
