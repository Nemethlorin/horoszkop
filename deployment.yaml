apiVersion: apps/v1
kind: Deployment
metadata:
  name: horoszkop-web
  namespace: horoszkop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: horoszkop-web
  template:
    metadata:
      labels:
        app: horoszkop-web
    spec:
      imagePullSecrets:
        - name: ghcr-auth
      containers:
        - name: horoszkop-web
          image: ghcr.io/placeholder/horoszkop:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: horoszkop-web
  namespace: horoszkop
spec:
  selector:
    app: horoszkop-web
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: horoszkop-web
  namespace: horoszkop
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
spec:
  ingressClassName: nginx
  rules:
    - host: nemeth-lorin-dorina-horoszkop.jcloud.jedlik.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: horoszkop-web
                port:
                  number: 80
